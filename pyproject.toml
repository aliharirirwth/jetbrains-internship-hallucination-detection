[tool.ruff]
target-version = "py311"
line-length = 120
exclude = [".git", ".pytest_cache", "**/evaluation.ipynb"]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]

[tool.pytest.ini_options]
markers = [
    "slow: marks tests that need network or large models (deselect with -m 'not slow')",
]
